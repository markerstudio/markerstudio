<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Marker Studio</title>
    <style>
      :root { color-scheme: light dark; }
      html, body {
        margin: 0;
        height: 100%;
        display: grid;
        place-items: center;
        background: #303030;
        color: #f5f2ec;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-user-select: none;
        user-select: none;
      }
      .wrap { text-align: center; }
      .dot {
        width: 14px; height: 14px; border-radius: 50%;
        background: #ff9100; margin: 0 auto 16px;
        animation: pulse 1.1s ease-in-out infinite;
      }
      @keyframes pulse { 0%,100% { opacity: .35; transform: scale(.85); } 50% { opacity: 1; transform: scale(1); } }
      h1 { font-size: 19px; margin: 0 0 6px; font-weight: 700; }
      p { opacity: .7; font-size: 14px; margin: 0; line-height: 1.5; }
      button {
        margin-top: 18px; border: 0; border-radius: 999px;
        background: #ff9100; color: #fff; font-weight: 700;
        padding: 10px 22px; font-size: 14px; cursor: pointer;
      }
      #offline { display: none; }
    </style>
  </head>
  <body>
    <!--
      Connection-aware launcher (the app window boots HERE, not on the remote
      site — see src-tauri/src/lib.rs). It probes marker.ps and hops over the
      moment it answers; while the Mac is offline it shows this branded screen
      and keeps retrying — the app never cold-starts into the webview's raw
      error page.
    -->
    <div class="wrap">
      <div class="dot"></div>
      <div id="connecting">
        <h1>Marker Studio</h1>
        <p>Connecting…</p>
      </div>
      <div id="offline">
        <h1>You're offline</h1>
        <p>No connection to the studio right now.<br />I'll keep trying and jump in the moment it's back.</p>
        <button onclick="probe()">Try now</button>
      </div>
    </div>
    <script>
      var HOME = "https://marker.ps/login";
      var PROBE = "https://marker.ps/api/health";
      var probing = false;

      function show(offline) {
        document.getElementById("connecting").style.display = offline ? "none" : "block";
        document.getElementById("offline").style.display = offline ? "block" : "none";
      }

      function probe() {
        if (probing) return;
        probing = true;
        // no-cors: resolves (opaque) whenever the site is reachable — even a
        // 503 means "online, go" (the site itself explains any degradation).
        // Only a network-level failure rejects.
        fetch(PROBE, { mode: "no-cors", cache: "no-store" })
          .then(function () { location.replace(HOME); })
          .catch(function () { probing = false; show(true); });
      }

      window.addEventListener("online", probe);
      setInterval(probe, 4000);
      probe();
    </script>
  </body>
</html>
