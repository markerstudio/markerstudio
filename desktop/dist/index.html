<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Marker Admin</title>
    <style>
      :root { color-scheme: light dark; }
      html, body {
        margin: 0;
        height: 100%;
        display: grid;
        place-items: center;
        background: #303030;
        color: #f5f2ec;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .wrap { text-align: center; }
      .dot {
        width: 14px; height: 14px; border-radius: 50%;
        background: #ff9100; margin: 0 auto 16px;
        animation: pulse 1.1s ease-in-out infinite;
      }
      @keyframes pulse { 0%,100% { opacity: .35; transform: scale(.85); } 50% { opacity: 1; transform: scale(1); } }
      p { opacity: .7; font-size: 14px; }
    </style>
  </head>
  <body>
    <!--
      This page is the bundled fallback frontend. The app window is configured
      (in src-tauri/tauri.conf.json) to load https://marker.ps/admin directly,
      so this is only shown if the remote portal can't be reached.
    -->
    <div class="wrap">
      <div class="dot"></div>
      <p>Loading Marker Admin…</p>
    </div>
  </body>
</html>
